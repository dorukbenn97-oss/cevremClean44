<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />

  <!-- iOS PWA / Safari uyumu -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Sohbet</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      overflow: hidden;
    }

    /* APP CONTAINER */
    .app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding-bottom: calc(56px + env(safe-area-inset-bottom));
    }

    /* TOP BAR */
    .header {
      height: 50px;
      background: #000;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* MESSAGES */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      padding-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .msg.left {
      background: #1f1f1f;
      align-self: flex-start;
    }

    .msg.right {
      background: #007aff;
      align-self: flex-end;
    }

    /* INPUT BAR */
    .input-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      border-top: 1px solid #222;
      display: flex;
      gap: 8px;
      padding: 8px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
    }

    .input-bar input {
      flex: 1;
      height: 40px;
      border-radius: 20px;
      border: none;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
    }

    .input-bar button {
      height: 40px;
      padding: 0 16px;
      border-radius: 20px;
      border: none;
      background: #007aff;
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="header">Sohbet</div>

    <div class="messages" id="messages">
      <div class="msg left">Selam</div>
      <div class="msg left">Nasılsın</div>
      <div class="msg right">İyiyim</div>
    </div>
  </div>

  <div class="input-bar">
    <input id="text" placeholder="Mesaj yaz..." />
    <button id="send">Gönder</button>
  </div>

  <script src="chat.js"></script>
</body>
</html>
